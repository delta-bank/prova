<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scuderia Sim Racing</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1e2748;
            --accent-color: #00d4ff;
            --card-bg: #2a345e;
            --text-color: #ffffff;
            --nav-bg: #151b33;
        }

        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 90px;
        }

        header { padding: 20px; text-align: center; background: rgba(0,0,0,0.2); }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; letter-spacing: 2px; margin: 0; }

        .page { display: none; padding: 20px; animation: fadeIn 0.2s ease; }
        .active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Griglie Categorie */
        .category-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        .cat-card {
            background: var(--card-bg);
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Liste Piloti e Tabelle Classifiche */
        .pilot-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent-color);
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; font-size: 0.9rem; }
        th { background: rgba(255,255,255,0.1); color: var(--accent-color); font-family: 'Orbitron'; font-size: 0.7rem; }
        tr:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.05); }

        .rank-num { font-family: 'Orbitron'; color: var(--accent-color); width: 30px; }

        .back-btn {
            background: none; border: 1px solid var(--accent-color); color: var(--accent-color);
            padding: 8px 12px; border-radius: 5px; margin-bottom: 15px; cursor: pointer;
        }

        /* Nav Bar */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: var(--nav-bg); display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .nav-item { background: none; border: none; color: #666; font-size: 0.7rem; font-weight: bold; }
        .nav-item.active-btn { color: var(--accent-color); }
        .nav-icon { font-size: 1.5rem; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <header><h1>VRT SIM RACING</h1></header>

    <div id="home" class="page active">
        <h2 style="font-size: 1rem; text-align: center;">LINEUP PILOTI</h2>
        <div class="category-grid">
            <div class="cat-card" onclick="showCategory('F1')">F1</div>
            <div class="cat-card" onclick="showCategory('F2')">F2</div>
            <div class="cat-card" onclick="showCategory('F3')">F3</div>
            <div class="cat-card" onclick="showCategory('F4')">F4</div>
        </div>
    </div>

    <div id="rank-menu" class="page">
        <h2 style="font-size: 1rem; text-align: center;">CLASSIFICHE CAMPIONATO</h2>
        <div class="category-grid">
            <div class="cat-card" style="border-color: gold;" onclick="showRank('F1')">F1 RANK</div>
            <div class="cat-card" style="border-color: gold;" onclick="showRank('F2')">F2 RANK</div>
            <div class="cat-card" style="border-color: gold;" onclick="showRank('F3')">F3 RANK</div>
            <div class="cat-card" style="border-color: gold;" onclick="showRank('F4')">F4 RANK</div>
        </div>
    </div>

    <div id="categoria-detail" class="page">
        <button class="back-btn" onclick="openPage('home')">← Categorie</button>
        <h2 id="cat-title" style="font-family: 'Orbitron'; color: var(--accent-color);"></h2>
        <div id="piloti-container"></div>
    </div>

    <div id="rank-detail" class="page">
        <button class="back-btn" onclick="openPage('rank-menu')">← Classifiche</button>
        <h2 id="rank-title" style="font-family: 'Orbitron'; color: var(--accent-color);"></h2>
        
        <h3 style="font-family: 'Orbitron'; font-size: 0.9rem; margin-top: 20px;">🏆 PILOTI</h3>
        <table id="table-piloti"></table>

        <h3 style="font-family: 'Orbitron'; font-size: 0.9rem; margin-top: 30px;">🏭 COSTRUTTORI</h3>
        <table id="table-team"></table>
    </div>

    <nav>
        <button id="btn-home" class="nav-item active-btn" onclick="openPage('home', this)">
            <span class="nav-icon">🏠</span>HOME
        </button>
        <button id="btn-rank" class="nav-item" onclick="openPage('rank-menu', this)">
            <span class="nav-icon">📊</span>RANK
        </button>
    </nav>

    <script>
        const teamData = {
            'F1': {
                piloti: [
                    { nome: 'Mario Rossi', vittorie: 5, ir: '4.5k' },
                    { nome: 'Luigi Bianchi', vittorie: 3, ir: '4.1k' }
                ],
                classificaPiloti: [
                    { pos: 1, nome: 'Mario Rossi', pt: 150 },
                    { pos: 2, nome: 'Luigi Bianchi', pt: 130 },
                    { pos: 3, nome: 'Max Ver', pt: 110 }
                ],
                classificaTeam: [
                    { pos: 1, nome: 'VRT Racing', pt: 280 },
                    { pos: 2, nome: 'Red Bull', pt: 250 }
                ]
            },
            'F2': {
                piloti: [{ nome: 'Alessandro Neri', vittorie: 2, ir: '3.2k' }, { nome: 'Marco Viola', vittorie: 1, ir: '3.0k' }],
                classificaPiloti: [{ pos: 1, nome: 'Alessandro Neri', pt: 90 }],
                classificaTeam: [{ pos: 1, nome: 'VRT Academy', pt: 150 }]
            },
            // Aggiungi qui F3 e F4 seguendo lo stesso schema...
        };

        function showCategory(cat) {
            const container = document.getElementById('piloti-container');
            document.getElementById('cat-title').innerText = 'TEAM ' + cat;
            container.innerHTML = '';
            teamData[cat].piloti.forEach(p => {
                container.innerHTML += `<div class="pilot-card"><strong>${p.nome}</strong><br><small>Vittorie: ${p.vittorie} | iRating: ${p.ir}</small></div>`;
            });
            openPage('categoria-detail');
        }

        function showRank(cat) {
            document.getElementById('rank-title').innerText = 'RANK ' + cat;
            
            // Riempie tabella Piloti
            let htmlP = `<tr><th>POS</th><th>PILOTA</th><th>PT</th></tr>`;
            teamData[cat].classificaPiloti.forEach(r => {
                htmlP += `<tr><td class="rank-num">${r.pos}</td><td>${r.nome}</td><td>${r.pt}</td></tr>`;
            });
            document.getElementById('table-piloti').innerHTML = htmlP;

            // Riempie tabella Team
            let htmlT = `<tr><th>POS</th><th>TEAM</th><th>PT</th></tr>`;
            teamData[cat].classificaTeam.forEach(r => {
                htmlT += `<tr><td class="rank-num">${r.pos}</td><td>${r.nome}</td><td>${r.pt}</td></tr>`;
            });
            document.getElementById('table-team').innerHTML = htmlT;

            openPage('rank-detail');
        }

        function openPage(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(btn) {
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active-btn'));
                btn.classList.add('active-btn');
            }
        }
    </script>
</body>
</html>
