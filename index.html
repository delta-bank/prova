<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TPS BANK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --card-color: #1e2748;
            --accent: #00f2ff;
            --text-dim: #666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* LOGO SOPRA IL SALDO */
        .brand-header {
            padding: 40px 20px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .custom-logo {
            max-width: 180px;
            height: auto;
            max-height: 80px;
            object-fit: contain;
        }

        /* SALDO */
        .balance-section {
            padding: 20px;
            text-align: center;
        }
        .label { color: var(--text-dim); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .balance { font-size: 46px; font-weight: 700; margin-top: 5px; }

        .main { flex: 1; padding: 0 25px; display: flex; flex-direction: column; align-items: center; }

        /* LA CARTA (STILE IMMAGINE GENERATA) */
        .card {
            width: 100%;
            max-width: 340px;
            aspect-ratio: 1.58 / 1;
            background-color: var(--card-color);
            background-image: radial-gradient(circle at top left, rgba(255,255,255,0.1), transparent);
            border-radius: 20px;
            padding: 25px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* LOGO GRANDE AL CENTRO */
        .card-center-logo {
            position: absolute;
            top: 47%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px; /* Grande al centro */
            height: auto;
            opacity: 0.15; /* Effetto filigrana/trasparente come nelle carte vere */
            pointer-events: none;
            z-index: 1;
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 2;
        }

        .card-chip {
    width: 48px;
    height: 35px;
    background: linear-gradient(135deg, #fceabb 0%, #fccd4d 50%, #f8b500 51%, #fbdf93 100%);
    border-radius: 6px;
    box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
    
    /* POSIZIONAMENTO LIBERO */
    position: absolute; 
    top: 80px;   /* Distanza dal bordo superiore */
    left: 25px;  /* Distanza dal bordo sinistro */
    z-index: 3;
}

   /* MASTERCARD - FORZATO IN ALTO A DESTRA */
        .mastercard-icon {
            position: absolute;
            top: 25px;    /* Stessa altezza del chip per simmetria */
            right: 75px;  /* Bloccato a destra */
            font-size: 45px;
            color: rgba(255, 255, 255, 0.8);
            z-index: 2;
        }

        .card-mid {
            z-index: 2;
            margin-top: 10px;
        }

        .card-number { 
            font-size: 20px; 
            letter-spacing: 3px; 
            color: #fff; 
            font-family: 'Courier New', monospace; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        /* POSIZIONAMENTO LIBERO */
    position: absolute;
    top: 60%;    /* Posizione verticale (50% è il centro esatto) */
    left: 25px;  /* Distanza dal bordo sinistro */
    z-index: 2;
}
        
        .card-bottom { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
            z-index: 2; 
        }
        
        .card-name-txt { 
            font-size: 13px; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
            color: #ffffff; 
            font-weight: 500;
        }

        .expiry-txt {
            font-size: 13px;
            color: #ffffff;
            font-weight: 500;
        }

        /* TASTI AZIONE */
        .actions { display: flex; gap: 40px; margin-top: 40px; }
        .btn-container { text-align: center; cursor: pointer; color: inherit; width: 100px;}
        .btn-disabled { opacity: 0.3; cursor: default; }

        .circle-icon {
            width: 60px; height: 60px; border-radius: 20px; /* Forma più squadrata moderna */
            background: #111; border: 1px solid #222;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; margin-bottom: 10px; transition: 0.2s;
            margin: 0 auto 10px;
        }

        .accent-color { color: var(--accent); border-color: rgba(0, 242, 255, 0.2); }

        /* NAV bar */
        .nav-bar {
            margin-top: auto;
            background: #080808;
            display: flex;
            justify-content: space-around;
            padding: 15px 0 35px;
            border-top: 1px solid #111;
        }
        .nav-link { color: #444; text-decoration: none; font-size: 22px; }
        .active-link { color: var(--accent); }

    </style>
</head>
<body>

    <div class="brand-header">
        <img src="logotps.png" alt="Logo" class="custom-logo">
    </div>

    <div class="balance-section">
        <p class="label">Current Balance</p>
        <h1 class="balance">€ 1.259,00</h1>
    </div>

    <main class="main">
        <div class="card">
            <img src="logotps.png" class="card-center-logo">

            <div class="card-top">
                <div class="card-chip"></div>
                <i class="fa-brands fa-cc-mastercard" style="font-size: 30px; color: rgba(255,255,255,0.5);"></i>
            </div>

            <div class="card-mid">
                <div class="card-number">•••• •••• •••• 1055</div>
            </div>

            <div class="card-bottom">
                <p class="card-name-txt">Leonardo Soru</p>
                <p class="expiry-txt">06/50</p>
            </div>
        </div>

        <div class="actions">
            <div class="btn-container" onclick="location.reload()">
                <div class="circle-icon accent-color"><i class="fa-solid fa-arrows-rotate"></i></div>
                <p class="label" style="font-size: 11px;">Boost</p>
            </div>
            <div class="btn-container btn-disabled">
                <div class="circle-icon"><i class="fa-solid fa-paper-plane"></i></div>
                <p class="label" style="font-size: 11px;">Send</p>
            </div>
        </div>
    </main>

    <nav class="nav-bar">
        <a href="#" class="nav-link active-link"><i class="fa-solid fa-house"></i></a>
        <a href="#" class="nav-link"><i class="fa-solid fa-chart-pie"></i></a>
        <a href="#" class="nav-link"><i class="fa-solid fa-user"></i></a>
    </nav>

</body>
</html>
